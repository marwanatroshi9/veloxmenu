worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Rate limiting zone for auth endpoints.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

    # Honor an upstream proxy's forwarded scheme (e.g. Dokploy/Traefik terminating
    # TLS in front of nginx); fall back to the local scheme when there is none.
    map $http_x_forwarded_proto $fwd_proto {
        default $scheme;
        "~."    $http_x_forwarded_proto;
    }

    # Use project-unique hostnames (aliases defined in the compose files) so that
    # sharing Dokploy's dokploy-network with other apps that also name a service
    # "backend"/"frontend" can't cause DNS collisions.
    upstream backend_upstream {
        server vm-backend:8000;
    }

    upstream frontend_upstream {
        server vm-frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # --- Uncomment to force HTTPS in production ---
        # return 301 https://$host$request_uri;

        # Security headers (defense in depth; app also sets these).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Backend API
        location /api/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
        }

        # OpenAPI docs
        location ~ ^/(docs|redoc|health) {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
        }

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $fwd_proto;
        }
    }

    # --- HTTPS server (enable after placing certs in ./nginx/certs) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     # ... same location blocks as above ...
    # }
}
