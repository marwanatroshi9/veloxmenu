# Dokploy deployment compose.
#
# Differences from the standalone docker-compose.yml:
#  - Nginx does NOT publish host ports 80/443. Dokploy's Traefik terminates TLS
#    and routes traffic to the nginx service over the shared `dokploy-network`.
#  - Nginx stays as an INTERNAL path router (/api -> backend, / -> frontend) so
#    the whole app is served from a single origin (no CORS/cookie issues).
#  - SSL is handled by Traefik/Let's Encrypt, not by our nginx.conf.
#
# In the Dokploy UI (Compose service):
#  1. Set the environment variables (see below).
#  2. Under "Domains", add your domain -> service `nginx`, container port `80`,
#     enable HTTPS with the Let's Encrypt provider. Dokploy generates the Traefik
#     labels for you (recommended). The commented labels below show the equivalent
#     if you prefer to manage them by hand — replace REPLACE_WITH_YOUR_DOMAIN.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-menuhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-menuhub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-menuhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - menuhub

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-menuhub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-menuhub}
      # Set COOKIE_SECURE=false only for HTTP-only hosts (e.g. sslip.io). Use
      # true whenever you serve over HTTPS (a real domain or *.traefik.me).
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      BACKEND_CORS_ORIGINS: ${PUBLIC_SITE_URL}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      FIRST_SUPERADMIN_EMAIL: ${FIRST_SUPERADMIN_EMAIL}
      FIRST_SUPERADMIN_PASSWORD: ${FIRST_SUPERADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    expose:
      - "8000"
    networks:
      menuhub:
        aliases:
          - vm-backend

  frontend:
    build:
      context: ./frontend
      args:
        # Single origin: the API is reached through nginx at /api/v1 on the same domain.
        NEXT_PUBLIC_API_URL: ${PUBLIC_SITE_URL}/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      menuhub:
        aliases:
          - vm-frontend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    expose:
      - "80"
    networks:
      - menuhub
      - dokploy-network
    # Routing is handled by Dokploy's Domains tab (add a domain on THIS nginx
    # service, container port 80). Keep exactly one domain there, and make sure
    # PUBLIC_SITE_URL in the Environment tab uses that exact same hostname.

volumes:
  pgdata:
  uploads:

networks:
  menuhub:
    driver: bridge
  dokploy-network:
    external: true
